<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Homie</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg0:#0a0a0c;--bg1:#111114;--bg2:#16161a;--bg3:#1c1c22;
      --border:#23232c;--border2:#2a2a35;
      --t1:#e8e8f0;--t2:#9090a8;--t3:#555568;
      --purple:#7c6fff;--teal:#38d9d9;--amber:#f59e0b;--red:#ff5555;
      --grad:linear-gradient(135deg,#7c6fff,#38d9d9);
    }
    html,body{height:100%;background:var(--bg0);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100vh}

    /* header */
    #hdr{display:flex;align-items:center;gap:10px;padding:13px 14px 11px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg1)}
    #logo{width:28px;height:28px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(124,111,255,.35)}
    #logo svg{width:14px;height:14px}
    #title-txt{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t1);flex:1}
    #sdot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background .3s,box-shadow .3s}
    #sdot.on{background:var(--teal);box-shadow:0 0 8px rgba(56,217,217,.5)}
    #sdot.run{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5);animation:p 1s infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
    #stxt{font-size:10px;color:var(--t3);margin-left:5px}

    /* agent bar */
    #abar{display:flex;align-items:center;gap:7px;padding:6px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg1)}
    #rdot{width:6px;height:6px;border-radius:50%;background:var(--amber);display:none;flex-shrink:0}
    #rdot.on{display:block;animation:p 1s infinite}
    #astatus{font-size:10px;color:var(--t3);flex:1}
    #steps{font-size:10px;color:var(--border2);font-family:'DM Mono',monospace}
    #stopbtn{display:none;width:22px;height:22px;border-radius:5px;background:rgba(255,85,85,.1);border:1px solid rgba(255,85,85,.2);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
    #stopbtn.on{display:flex}
    #stopbtn svg{width:9px;height:9px}

    /* messages */
    .msgs{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
    .msgs::-webkit-scrollbar{width:3px}
    .msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .mrow{display:flex;align-items:flex-start;gap:7px}
    .mrow.user{flex-direction:row-reverse}
    .av{width:22px;height:22px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .av svg{width:11px;height:11px}
    .bai{background:var(--bg2);border:1px solid var(--border);border-radius:2px 10px 10px 10px;color:var(--t2);font-size:12px;line-height:1.6;padding:7px 10px;max-width:calc(100% - 36px);word-break:break-word}
    .buser{background:rgba(124,111,255,.1);border:1px solid rgba(124,111,255,.2);border-radius:10px 2px 10px 10px;color:var(--t1);font-size:12px;line-height:1.6;padding:7px 10px;max-width:calc(100% - 36px);word-break:break-word}
    .bact{background:rgba(124,111,255,.05);border:1px solid var(--border);border-left:2px solid var(--purple);border-radius:0 8px 8px 0;color:#6868a8;font-size:11px;line-height:1.5;padding:5px 9px;max-width:calc(100% - 36px);word-break:break-word;font-family:'DM Mono',monospace}
    .albl{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--purple);margin-bottom:2px}
    .shot{border-radius:6px;overflow:hidden;border:1px solid var(--border);max-width:calc(100% - 36px)}
    .shot img{width:100%;display:block}
    .shot-lbl{font-size:9px;color:var(--t3);padding:3px 7px;background:var(--bg1);font-family:'DM Mono',monospace}
    .sys{text-align:center;font-size:10px;color:var(--t3);padding:2px 0}
    .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);padding:20px;text-align:center}
    .empty-icon{width:40px;height:40px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
    .empty-icon svg{width:20px;height:20px}
    .empty-ttl{font-size:13px;font-weight:600;color:var(--t2)}
    .empty-sub{font-size:11px;line-height:1.6}

    /* input bar */
    .ibar{display:flex;align-items:flex-end;gap:7px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg1)}
    .ifield{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--t1);font-size:12px;line-height:1.5;padding:8px 11px;resize:none;outline:none;font-family:'DM Sans',sans-serif;max-height:80px;transition:border-color .2s}
    .ifield:focus{border-color:rgba(124,111,255,.4)}
    .ifield:disabled{opacity:.35;cursor:not-allowed}
    .ifield::placeholder{color:var(--t3)}
    .sbtn{width:32px;height:32px;border-radius:10px;background:var(--grad);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .1s;box-shadow:0 2px 12px rgba(124,111,255,.3)}
    .sbtn:hover:not(:disabled){opacity:.85;transform:scale(1.05)}
    .sbtn:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
    .sbtn svg{width:13px;height:13px}
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <div id="title-txt">Homie</div>
    <div id="sdot"></div><span id="stxt">idle</span>
  </div>

  <div id="abar">
    <div id="rdot"></div>
    <span id="astatus">Ready</span>
    <span id="steps"></span>
    <button id="stopbtn"><svg viewBox="0 0 24 24" fill="#ff5555"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></button>
  </div>

  <div class="msgs" id="msgs-auto">
    <div class="empty" id="empty-auto">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      <div class="empty-ttl">Auto mode</div>
      <div class="empty-sub">Tell Homie what to do and it will automatically interact with the page.</div>
    </div>
  </div>

  <div class="ibar">
    <textarea class="ifield" id="input-auto" placeholder="What should I do?" rows="1"></textarea>
    <button class="sbtn" id="send-auto"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff"/></svg></button>
  </div>
</div>
<script src="sidepanel.js"></script>
</body>
</html>
